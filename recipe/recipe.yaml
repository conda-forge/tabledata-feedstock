schema_version: 1

context:
  version: "1.3.5"

package:
  name: tabledata
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tabledata/tabledata-${{ version }}.tar.gz
  sha256: 98c64d0ad6b520846b41000fb3f5b2f42fa7ca2675c2c669e5ccab6b93082a36

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - setuptools_scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - dataproperty >=1.0.2,<2
    - typepy >=1.2.0,<3

tests:
  - python:
      imports:
        - tabledata
        - tabledata._logger
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: tabledata is a Python library to represent tabular data. Used for pytablewriter/pytablereader/SimpleSQLite.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/thombashi/tabledata
  repository: https://github.com/thombashi/tabledata
  documentation: http://tabledata.rtfd.io/

extra:
  recipe-maintainers:
    - basnijholt
